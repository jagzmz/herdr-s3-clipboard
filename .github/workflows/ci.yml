name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 20
          - os: windows-latest
            node: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: |
          for file in src/*.mjs scripts/*.js; do
            node --check "$file"
          done

      - name: Audit production dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: npm audit --omit=dev
